name: DialectListener
options:
  bundleIdPrefix: com.dustland
targets:
  DialectListener:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DialectListener
      - path: Shared
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: "Dialect Listener"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "We need microphone access to record surrounding dialect conversations for listening exercises."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "We need speech recognition permission to transcribe dialect conversations on-device."
        INFOPLIST_KEY_UIBackgroundModes: 
          - audio
        PRODUCT_BUNDLE_IDENTIFIER: com.dustland.DialectListener
        CODE_SIGN_IDENTITY: "Apple Distribution"
        DEVELOPMENT_TEAM: "" # User can input their Apple Developer Team ID here
